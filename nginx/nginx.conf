# ─────────────────────────────────────────────────────────────────────────────
#  Nginx main config — CRYSTALS-Kyber Training Platform
#  HTTP-only now.  TLS upgrade: swap conf.d/app.conf with conf.d/app_tls.conf
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss;

    # ── Security: hide nginx version ─────────────────────────────────────────
    server_tokens off;

    # ── Rate limiting zones ──────────────────────────────────────────────────
    # General requests: 100r/m per IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;
    # Auth endpoints: 10r/m per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
    # Answer submit: 30r/m per IP
    limit_req_zone $binary_remote_addr zone=submit:10m  rate=30r/m;

    # ── Connection limits ────────────────────────────────────────────────────
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ── Client body limits ───────────────────────────────────────────────────
    client_max_body_size 64k;     # answers are small
    client_body_timeout  10s;
    client_header_timeout 10s;

    # ── Upstream: FastAPI backend ─────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}
