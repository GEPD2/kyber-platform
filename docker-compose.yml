#  CRYSTALS-Kyber Training Platform
#  Services: nginx · backend (FastAPI) · mysql · redis

services:

  # NGINX
  nginx:
    image: nginx:1.25-alpine
    container_name: kyber_https_nginx
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kyber_https_net

  # BACKEND
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kyber_https_backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kyber_https_net
    # healthcheck mirrors the one in Dockerfile but can be overridden here
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 60s

  # MYSQL
  mysql:
    image: mysql:8.0
    container_name: kyber_https_mysql
    restart: unless-stopped
    expose:
      - "3306"
    env_file:
      - .env
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
      - ./mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - kyber_https_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}",
             "--get-server-public-key"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=caching_sha2_password
      --require-secure-transport=OFF
      --ssl=OFF

  # REDIS
  redis:
    image: redis:7-alpine
    container_name: kyber_https_redis
    restart: unless-stopped
    expose:
      - "6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    volumes:
      - redis_data:/data
    networks:
      - kyber_https_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# VOLUMES
volumes:
  mysql_data:  { driver: local }
  redis_data:  { driver: local }
  nginx_logs:  { driver: local }

# NETWORKS
networks:
  kyber_https_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
