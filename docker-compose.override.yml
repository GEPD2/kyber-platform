#  docker-compose.override.yml — development overrides
#  This file is loaded automatically alongside docker-compose.yml in dev.
#  Do NOT use in production — it removes :ro mounts and enables hot-reload.
#  In production: docker compose -f docker-compose.yml up -d
services:
  backend:
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/app
      --log-level debug
    volumes:
      - ./backend/app:/app/app   # writable for hot-reload (no :ro)
    environment:
      - APP_ENV=development
      - DEBUG=true

  mysql:
    ports:
      - "3306:3306"   # expose MySQL to host for local clients (dev only)

  redis:
    ports:
      - "6379:6379"   # expose Redis to host for local inspection (dev only)
